<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a6e28" />
      <stop offset="25%" stop-color="#cba14b" />
      <stop offset="45%" stop-color="#f7e7a1" />
      <stop offset="65%" stop-color="#d4aa52" />
      <stop offset="85%" stop-color="#a87a2d" />
      <stop offset="100%" stop-color="#e3be66" />
    </linearGradient>

    <style>
      .navy-text { fill: #0b1a2d; }
      .gold-text { fill: url(#goldGradient); }
      
      .brand-c {
        font-family: "Didot", "Bodoni MT", "Cinzel", "Playfair Display", "Times New Roman", serif;
        font-size: 270px;
        font-weight: 600;
      }

      .title-text {
        font-family: "Cinzel", "Didot", "Bodoni MT", "Times New Roman", serif;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 11px;
        fill: #0b1a2d;
      }

      .subtitle-text {
        font-family: "Montserrat", "Helvetica Neue", "Arial", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 3.5px;
        fill: #0b1a2d;
      }
    </style>
  </defs>

  <g transform="translate(0, 20)">
    <!-- Monogramme CC P -->
    <g class="brand-c">
      <text x="160" y="375" class="navy-text">C</text>
      <text x="395" y="375" class="navy-text">C</text>
      <text x="635" y="375" class="gold-text">P</text>
    </g>

    <!-- Flèche dorée -->
    <path d="M 370 412 
             C 450 415, 560 410, 665 372 
             C 740 345, 805 298, 843 242 
             L 818 253 
             L 872 225 
             L 856 280 
             L 848 261 
             C 812 312, 750 357, 672 385 
             C 570 421, 455 425, 370 412 Z" 
          fill="url(#goldGradient)" />

    <!-- Titre -->
    <text x="506" y="465" text-anchor="middle" class="title-text">CLIMATE CATALYST PRIZE</text>

    <!-- Sous-titre -->
    <g transform="translate(0, 498)">
      <line x1="160" y1="-3" x2="190" y2="-3" stroke="url(#goldGradient)" stroke-width="1.8" stroke-linecap="round" />
      <text x="500" y="0" text-anchor="middle" class="subtitle-text">CATALYZING CLIMATE SOLUTIONS. TRANSFORMING FUTURES.</text>
      <line x1="810" y1="-3" x2="840" y2="-3" stroke="url(#goldGradient)" stroke-width="1.8" stroke-linecap="round" />
    </g>
  </g>
</svg>
