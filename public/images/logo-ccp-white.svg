<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 135" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&amp;family=Inter:wght@700;800&amp;display=swap');
      
      .brand-title-white {
        font-family: 'Cinzel', 'Playfair Display', 'Times New Roman', serif;
        font-size: 104px;
        font-weight: 800;
        fill: #FFFFFF;
      }
      .brand-title-gold {
        font-family: 'Cinzel', 'Playfair Display', 'Times New Roman', serif;
        font-size: 104px;
        font-weight: 800;
        fill: url(#goldGradWhite);
      }
      .brand-sub-white {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.38em;
        fill: #C8A04D;
        text-transform: uppercase;
      }
    </style>

    <linearGradient id="goldGradWhite" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A6E28" />
      <stop offset="25%" stop-color="#CBA14B" />
      <stop offset="50%" stop-color="#F7E7A1" />
      <stop offset="75%" stop-color="#D4AA52" />
      <stop offset="100%" stop-color="#E3BE66" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 5)">
    <!-- Monogram C C P -->
    <text x="5" y="92" class="brand-title-white">C</text>
    <text x="105" y="92" class="brand-title-white">C</text>
    <text x="205" y="92" class="brand-title-gold">P</text>

    <!-- Golden Swoosh Accent -->
    <path d="M 100 98 C 140 101, 185 96, 230 84 C 265 74, 298 56, 318 36 L 305 40 L 332 30 L 324 50 L 320 43 C 302 61, 272 78, 235 88 C 190 101, 142 105, 100 98 Z" fill="url(#goldGradWhite)" />

    <!-- Subtitle Tagline -->
    <text x="8" y="122" class="brand-sub-white">CLIMATE CATALYST PRIZE</text>
  </g>
</svg>
